# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# Docs for the Azure Functions action: https://github.com/Azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy app - fake

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: npm install, build, and test
        run: |
          cd ui
          npm install
          npm run build --if-present

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend
          path: ui/www

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: api
          path: api

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    
    steps:
      - name: Download frontend artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: frontend
          path: ui/www
      
      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'fake'
          slot-name: 'Production'
          package: ./ui/www
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_FEEC4714E9DD4685B9AF7BBEFF40F87F }}

  deploy-api:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'

    steps:
      - name: Download API artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: api
          path: api

      - name: Check API publish profile secret
        env:
          AZURE_FUNCTIONAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
        run: |
          if [ -z "$AZURE_FUNCTIONAPP_PUBLISH_PROFILE" ]; then
            echo "::error::Missing AZURE_FUNCTIONAPP_PUBLISH_PROFILE secret for Function App fa-fakedata."
            exit 1
          fi

      - name: 'Deploy to Azure Function App'
        id: deploy-to-functionapp
        uses: Azure/functions-action@v1
        with:
          app-name: 'fa-fakedata'
          package: ./api
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          respect-funcignore: true
          scm-do-build-during-deployment: true
          enable-oryx-build: true
